<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f5ad6" />
      <stop offset="100%" stop-color="#003594" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Styled Shield / Hexagon Frame -->
  <path d="M 60,8 L 105,30 L 105,75 L 60,112 L 15,75 L 15,30 Z" 
        fill="none" 
        stroke="url(#blueGrad)" 
        stroke-width="3" 
        stroke-linejoin="round"
        opacity="0.15" />

  <!-- Letter 'C' -->
  <path d="M 52,38 C 36,38 28,48 28,60 C 28,72 36,82 52,82 C 62,82 66,77 68,73 L 68,85 C 64,88 58,90 50,90 C 28,90 16,76 16,60 C 16,44 28,30 50,30 C 58,30 64,32 68,35 L 68,47 C 66,43 62,38 52,38 Z" 
        fill="url(#blueGrad)" />

  <!-- Letter 'A' (Interlocking with C) -->
  <path d="M 88,32 L 104,88 L 92,88 L 88,74 L 68,74 L 64,88 L 54,88 L 72,32 Z M 85,63 L 78,40 L 71,63 Z" 
        fill="url(#greenGrad)" />

  <!-- Dynamic swoosh / tick mark overlay indicating Growth/Success -->
  <path d="M 45,95 C 65,95 85,85 102,68" 
        fill="none" 
        stroke="url(#greenGrad)" 
        stroke-width="4.5" 
        stroke-linecap="round" />
  
  <path d="M 94,66 L 103,67 L 102,76" 
        fill="none" 
        stroke="url(#greenGrad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
